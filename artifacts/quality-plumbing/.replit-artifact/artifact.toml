kind = "web"
previewPath = "/"
title = "Quality Plumbing Service"
version = "1.0.0"
id = "artifacts/quality-plumbing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20993

[services.development]
run = "pnpm --filter @workspace/quality-plumbing run dev"

[services.production]
publicDir = "artifacts/quality-plumbing"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20993"
